<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
</head>
<body>
    <div class="container">
        <h1>Kanban Board</h1>
        <div class="board">
            <!-- LIST 1 -->
             <div class="list" id="list1">
                <h2>To Do</h2>
                <div class="card" draggable="true" id="card1">Meditate</div>
                <div class="card" draggable="true" id="card2">30min Jogging</div>
             </div>

             <!-- LIST 2 -->
             <div class="list" id="list2">
                <h2>In Progress</h2>
                <div class="card" draggable="true" id="card3">Read A Book</div>
             </div>

            <!-- LIST 3 -->
             <div class="list" id="list3">
                <h2>Done</h2>
        </div>
    </div>
</body>
</html>
